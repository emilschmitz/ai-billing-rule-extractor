services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: validator
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rules_db
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U validator -d rules_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # rules_engine:
  #   build:
  #     context: .
  #     dockerfile: rules_engine/Dockerfile
  #   environment:
  #     - DATABASE_URL=postgresql+asyncpg://validator:password@postgres:5432/rules_db
  #     - SYNC_DATABASE_URL=postgresql://validator:password@postgres:5432/rules_db
  #   ports:
  #     - "8000:8000"
  #   depends_on:
  #     postgres:
  #       condition: service_healthy

  rules_extractor:
    build:
      context: .
      dockerfile: rules_extractor/Dockerfile
    env_file:
      - .env
    environment:
      - DATABASE_URL=postgresql+asyncpg://validator:password@postgres:5432/rules_db
      - SYNC_DATABASE_URL=postgresql://validator:password@postgres:5432/rules_db
    ports:
      - "8501:8501"
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  db_data:
